<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>لوحة التحكم</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
font-family:Arial;
margin:0;
display:flex;
background:#f5f5f5;
}

.sidebar{
width:250px;
background:#1e293b;
color:white;
height:100vh;
padding:20px;
}

.sidebar h2{
margin-bottom:20px;
}

.sidebar button{
width:100%;
padding:10px;
margin-bottom:10px;
border:none;
background:#334155;
color:white;
cursor:pointer;
}

.sidebar button:hover{
background:#475569;
}

.content{
flex:1;
padding:20px;
overflow:auto;
}

.stat-card{
background:white;
padding:20px;
margin-bottom:15px;
border-radius:10px;
}

.stats-grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:15px;
}

table{
width:100%;
border-collapse:collapse;
background:white;
}

td,th{
padding:10px;
border-bottom:1px solid #ddd;
}

.add-btn{
padding:10px 15px;
margin-bottom:15px;
cursor:pointer;
}

.records-grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
gap:15px;
}

.record-card{
background:white;
padding:15px;
border-radius:10px;
}

.edit-btn,.delete-btn{
padding:5px 10px;
margin-left:5px;
cursor:pointer;
}

.edit-btn{
background:#3b82f6;
color:white;
border:none;
}

.delete-btn{
background:#ef4444;
color:white;
border:none;
}

/* modal */

.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
justify-content:center;
align-items:center;
}

.modal-content{
background:white;
padding:20px;
border-radius:10px;
min-width:300px;
}

/* toast */

.toast{
position:fixed;
bottom:20px;
left:20px;
background:#333;
color:white;
padding:10px 15px;
border-radius:5px;
display:none;
}

</style>
</head>

<body>

<div class="sidebar">

<h2>لوحة التحكم</h2>

<button onclick="loadSection('dashboard')">لوحة القيادة</button>
<button onclick="loadSection('users')">المستخدمين</button>
<button onclick="loadSection('orders')">الطلبات</button>
<button onclick="loadSection('charges')">طلبات الشحن</button>
<button onclick="loadSection('paymentMethods')">طرق الدفع</button>
<button onclick="loadSection('currencies')">العملات</button>
<button onclick="loadSection('vipProfit')">نسبة VIP</button>
<button onclick="loadSection('profitLog')">الأرباح</button>
<button onclick="loadSection('maintenance')">الصيانة</button>

</div>

<div class="content">

<div id="contentArea"></div>

</div>

<!-- modal -->

<div id="genericModal" class="modal">
<div class="modal-content" id="modalContent"></div>
</div>

<!-- toast -->

<div id="toast" class="toast"></div>

<script src="js/airtable-config.js"></script>
<script src="js/airtable-service.js"></script>
<script src="js/admin.js"></script>

<script>

document.addEventListener("DOMContentLoaded",function(){
loadSection("dashboard");
});

function showModal(id,content){

const modal=document.getElementById(id)
const modalContent=document.getElementById("modalContent")

modalContent.innerHTML=content
modal.style.display="flex"

}

function closeModal(id){

document.getElementById(id).style.display="none"

}

function showToast(message){

const toast=document.getElementById("toast")

toast.innerText=message
toast.style.display="block"

setTimeout(()=>{
toast.style.display="none"
},3000)

}

</script>

</body>
</html>
